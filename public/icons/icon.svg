<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Offerwise">
  <defs>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="#0f766e"/>

    <!-- "A" 字形主体 — 白色几何字母，兼具向上箭头感 -->
    <path d="M140 400L256 88L372 400H316V220C316 190 280 190 280 190"
          fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 内部"AI"中的 I 笔画 — 青色 -->
    <path d="M200 400H240V250L272 188L304 250V400H344"
          fill="none" stroke="#14b8a6" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 三个节点 — 象征跟踪/分析/决策 -->
    <circle cx="212" cy="144" r="22" fill="#14b8a6"/>
    <circle cx="256" cy="104" r="18" fill="#dff4ef"/>
    <circle cx="300" cy="144" r="22" fill="#14b8a6"/>

    <!-- 节点连线 -->
    <line x1="212" y1="144" x2="212" y2="180" stroke="#14b8a6" stroke-width="10" stroke-linecap="round"/>
    <line x1="300" y1="144" x2="300" y2="180" stroke="#14b8a6" stroke-width="10" stroke-linecap="round"/>
    <line x1="256" y1="104" x2="256" y2="140" stroke="#dff4ef" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
